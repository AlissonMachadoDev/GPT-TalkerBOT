name: "Deploy to AWS"

on:
  # Só deploya no push para main e sob demanda. O gatilho pull_request foi
  # removido: ele fazia PRs contra main deployarem código não-mergeado em prod.
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: "Deploy to EC2"
    runs-on: ubuntu-latest

    environment: production

    steps:
      # Falha cedo e com mensagem clara se o secret do bucket não estiver
      # configurado (senão o erro só aparece lá no fim, como um "Invalid bucket
      # name" do aws s3 cp).
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.AWS_CODEDEPLOY_BUCKET }}" ]; then
            echo "::error::Secret AWS_CODEDEPLOY_BUCKET não está configurado. Defina-o com o nome do bucket S3 que hospeda os bundles do CodeDeploy."
            exit 1
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.2"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          git \
          make \
          gcc \
          g++ \
          erlang-dev \
          erlang-src

      - name: Install Dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod

      - name: Create Production Release
        env:
          MIX_ENV: prod
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
        run: |
          mix compile
          mix phx.digest
          mix release --overwrite

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create or Update CodeDeploy Application
        run: |
          aws deploy create-application \
            --application-name gpt_talkerbot || true

      - name: Create or Update Deployment Group
        run: |
          aws deploy create-deployment-group \
            --application-name gpt_talkerbot \
            --deployment-group-name gpt_talkerbot-production \
            --service-role-arn ${{ secrets.AWS_CODEDEPLOY_SERVICE_ROLE }} \
            --deployment-style deploymentType=IN_PLACE,deploymentOption=WITHOUT_TRAFFIC_CONTROL \
            --ec2-tag-filters Key=Environment,Type=KEY_AND_VALUE,Value=Production || true

      # Empacota a RELEASE JÁ COMPILADA (não o fonte). O bundle vai pro S3 e o
      # CodeDeploy o baixa via --s3-location — a instância nunca mais recompila.
      - name: Create Deployment Bundle
        run: |
          mkdir -p bundle/release
          cp -a _build/prod/rel/gpt_talkerbot/. bundle/release/
          cp -a scripts bundle/scripts
          cp appspec.yml bundle/appspec.yml
          (cd bundle && zip -r ../bundle.zip . >/dev/null)

      - name: Upload Bundle to S3
        run: |
          aws s3 cp bundle.zip \
            "s3://${{ secrets.AWS_CODEDEPLOY_BUCKET }}/gpt_talkerbot/${{ github.sha }}.zip"

      - name: Create CodeDeploy Deployment
        run: |
          aws deploy create-deployment \
            --application-name gpt_talkerbot \
            --deployment-group-name gpt_talkerbot-production \
            --s3-location bucket=${{ secrets.AWS_CODEDEPLOY_BUCKET }},key=gpt_talkerbot/${{ github.sha }}.zip,bundleType=zip
